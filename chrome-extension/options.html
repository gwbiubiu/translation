<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>智能翻译 - 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px; width: 440px;
    }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: #1a1a1a; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    input:focus { border-color: #1a73e8; }
    .hint { font-size: 12px; color: #aaa; margin-top: 6px; }
    .btn {
      margin-top: 20px; width: 100%; padding: 10px;
      background: #1a73e8; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    .btn:hover { background: #1557b0; }
    .status { margin-top: 12px; font-size: 13px; color: #34a853; text-align: center; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚙ 设置</h1>
    <label for="apiBase">后端服务地址</label>
    <input id="apiBase" type="text" placeholder="http://localhost:5000" />
    <p class="hint">默认：http://localhost:5000（本地运行时无需修改）</p>
    <button class="btn" id="saveBtn">保存</button>
    <div class="status" id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
