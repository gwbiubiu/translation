<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>智能翻译 - 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 28px 28px 24px; width: 460px;
    }

    /* Header */
    .card-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    }
    .card-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(99,102,241,0.35); flex-shrink: 0;
    }
    .card-header h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; }

    /* Section */
    .section { margin-bottom: 22px; }
    .section-title {
      font-size: 12px; font-weight: 600; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    /* Tier cards */
    .tier-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .tier-card {
      border: 2px solid #e5e7eb; border-radius: 10px;
      padding: 14px 12px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .tier-card:hover { border-color: #a5b4fc; background: #fafbff; }
    .tier-card.active {
      border-color: #6366f1;
      background: linear-gradient(135deg, #fafbff, #f5f3ff);
      box-shadow: 0 2px 8px rgba(99,102,241,0.12);
    }
    .tier-badge {
      position: absolute; top: 8px; right: 8px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #6366f1; display: none;
      align-items: center; justify-content: center;
    }
    .tier-card.active .tier-badge { display: flex; }
    .tier-badge svg { display: block; }

    .tier-icon {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .tier-icon.free { background: #eff6ff; }
    .tier-icon.paid { background: #fdf4ff; }

    .tier-name { font-size: 14px; font-weight: 600; color: #1f2937; margin-bottom: 4px; }
    .tier-desc { font-size: 12px; color: #6b7280; line-height: 1.5; }

    .tier-features { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
    .tier-feature {
      font-size: 11px; color: #9ca3af;
      display: flex; align-items: center; gap: 5px;
    }
    .tier-card.active .tier-feature { color: #6b7280; }
    .feat-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: #d1d5db; flex-shrink: 0;
    }
    .tier-card.active .feat-dot { background: #818cf8; }

    /* API section */
    .api-section { margin-bottom: 22px; }
    .field-label { font-size: 13px; color: #374151; font-weight: 500; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%; padding: 9px 12px; border: 1px solid #e5e7eb;
      border-radius: 8px; font-size: 14px; outline: none;
      color: #1f2937; transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    input[type="text"]:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 5px; }

    /* Save button */
    .btn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 6px rgba(99,102,241,0.3);
      transition: opacity 0.15s, box-shadow 0.15s;
    }
    .btn:hover { opacity: 0.92; box-shadow: 0 3px 10px rgba(99,102,241,0.35); }

    .status {
      margin-top: 10px; font-size: 13px; color: #10b981;
      text-align: center; min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Header -->
    <div class="card-header">
      <div class="card-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
        </svg>
      </div>
      <h1>设置</h1>
    </div>

    <!-- Tier selection -->
    <div class="section">
      <div class="section-title">使用套餐</div>
      <div class="tier-grid">

        <div class="tier-card active" id="tierFree" data-tier="free">
          <div class="tier-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                 stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="tier-icon free">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                 stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div class="tier-name">免费版</div>
          <div class="tier-desc">有道翻译 · 无需后端</div>
          <div class="tier-features">
            <div class="tier-feature"><div class="feat-dot"></div>有道机器翻译</div>
            <div class="tier-feature"><div class="feat-dot"></div>英文词汇自动提取</div>
            <div class="tier-feature"><div class="feat-dot"></div>有道词典释义</div>
          </div>
        </div>

        <div class="tier-card" id="tierPaid" data-tier="paid">
          <div class="tier-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                 stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="tier-icon paid">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                 stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </div>
          <div class="tier-name">付费版</div>
          <div class="tier-desc">Claude AI · 需要后端</div>
          <div class="tier-features">
            <div class="tier-feature"><div class="feat-dot"></div>Claude AI 翻译</div>
            <div class="tier-feature"><div class="feat-dot"></div>AI 智能关键词提取</div>
            <div class="tier-feature"><div class="feat-dot"></div>更准确的语义理解</div>
          </div>
        </div>

      </div>
    </div>

    <!-- Backend URL (paid only) -->
    <div class="api-section" id="apiSection" style="display:none">
      <div class="field-label">后端服务地址</div>
      <input id="apiBase" type="text" placeholder="http://localhost:5000" />
      <p class="hint">默认：http://localhost:5000（本地运行时无需修改）</p>
    </div>

    <button class="btn" id="saveBtn">保存设置</button>
    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
