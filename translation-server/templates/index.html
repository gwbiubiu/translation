<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能翻译</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 900px;
      max-width: 95vw;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .lang-bar {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      font-size: 13px;
      color: #666;
      gap: 8px;
    }

    .lang-tag {
      background: #e8f0fe;
      color: #1a73e8;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .arrow {
      color: #999;
      font-size: 16px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
    }

    .divider {
      background: #eee;
    }

    .panel {
      padding: 0;
      position: relative;
    }

    textarea {
      width: 100%;
      height: 280px;
      padding: 20px;
      font-size: 15px;
      line-height: 1.7;
      border: none;
      outline: none;
      resize: none;
      color: #1a1a1a;
      background: transparent;
    }

    .output-text {
      width: 100%;
      height: 280px;
      padding: 20px;
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a1a;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output-text.placeholder {
      color: #bbb;
    }

    .panel-footer {
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #f0f0f0;
      min-height: 40px;
    }

    .char-count {
      font-size: 12px;
      color: #bbb;
    }

    .clear-btn {
      font-size: 12px;
      color: #999;
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .clear-btn:hover { background: #f5f5f5; color: #666; }

    .copy-btn {
      font-size: 12px;
      color: #1a73e8;
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .copy-btn:hover { background: #e8f0fe; }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>智能翻译</h1>
    <div class="card">
      <div class="lang-bar">
        <span id="srcLabel" class="lang-tag">自动检测</span>
        <span class="arrow">→</span>
        <span id="tgtLabel" class="lang-tag">目标语言</span>
      </div>
      <div class="panels">
        <div class="panel">
          <textarea id="inputText" placeholder="输入中文或英文，自动识别并翻译…"></textarea>
          <div class="panel-footer">
            <span class="char-count" id="charCount">0 字符</span>
            <button class="clear-btn" onclick="clearInput()">清空</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="panel">
          <div class="status" id="spinner"><div class="spinner" id="spinnerIcon"></div></div>
          <div class="output-text placeholder" id="outputText">翻译结果将显示在这里</div>
          <div class="panel-footer">
            <span></span>
            <button class="copy-btn" id="copyBtn" onclick="copyResult()" style="display:none">复制</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const LANG_NAMES = { zh: "中文", en: "英文" };
    let debounceTimer = null;
    let lastText = "";

    const inputEl = document.getElementById("inputText");
    const outputEl = document.getElementById("outputText");
    const spinnerEl = document.getElementById("spinnerIcon");
    const srcLabel = document.getElementById("srcLabel");
    const tgtLabel = document.getElementById("tgtLabel");
    const charCount = document.getElementById("charCount");
    const copyBtn = document.getElementById("copyBtn");

    function detectLang(text) {
      return /[一-鿿]/.test(text) ? "zh" : "en";
    }

    function updateLangBar(from, to) {
      srcLabel.textContent = LANG_NAMES[from] || "自动检测";
      tgtLabel.textContent = LANG_NAMES[to] || "目标语言";
    }

    inputEl.addEventListener("input", () => {
      const text = inputEl.value;
      charCount.textContent = `${text.length} 字符`;

      if (!text.trim()) {
        resetOutput();
        return;
      }

      const lang = detectLang(text);
      updateLangBar(lang, lang === "zh" ? "en" : "zh");

      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => doTranslate(text), 600);
    });

    async function doTranslate(text) {
      if (text === lastText) return;
      lastText = text;

      outputEl.style.display = "none";
      spinnerEl.style.display = "block";
      copyBtn.style.display = "none";

      try {
        const res = await fetch("/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();
        spinnerEl.style.display = "none";
        outputEl.style.display = "block";

        if (data.translated) {
          outputEl.textContent = data.translated;
          outputEl.classList.remove("placeholder");
          updateLangBar(data.from, data.to);
          copyBtn.style.display = "inline-block";
        } else {
          outputEl.textContent = "翻译失败，请检查 API 配置";
          outputEl.classList.add("placeholder");
        }
      } catch {
        spinnerEl.style.display = "none";
        outputEl.style.display = "block";
        outputEl.textContent = "请求失败，请检查网络";
        outputEl.classList.add("placeholder");
      }
    }

    function resetOutput() {
      lastText = "";
      outputEl.textContent = "翻译结果将显示在这里";
      outputEl.classList.add("placeholder");
      outputEl.style.display = "block";
      spinnerEl.style.display = "none";
      copyBtn.style.display = "none";
      srcLabel.textContent = "自动检测";
      tgtLabel.textContent = "目标语言";
      charCount.textContent = "0 字符";
    }

    function clearInput() {
      inputEl.value = "";
      clearTimeout(debounceTimer);
      resetOutput();
    }

    function copyResult() {
      navigator.clipboard.writeText(outputEl.textContent).then(() => {
        copyBtn.textContent = "已复制";
        setTimeout(() => copyBtn.textContent = "复制", 1500);
      });
    }
  </script>
</body>
</html>
