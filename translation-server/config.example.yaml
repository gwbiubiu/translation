port: 15001
session_secret: "your-random-secret-string"
frontend_url: "http://localhost:5173"  # 生产环境填域名，或留空（Flask 与前端同域时）

ai:
  api_key: "YOUR_AIHUBMIX_API_KEY"
  base_url: "https://aihubmix.com/v1"
  model: "claude-sonnet-4-5"

google:
  client_id: "YOUR_GOOGLE_CLIENT_ID"
  client_secret: "YOUR_GOOGLE_CLIENT_SECRET"
  redirect_uri: "http://localhost:15001/auth/google/callback"  # 生产环境改为 https://yourdomain.com/auth/google/callback

mysql:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "YOUR_MYSQL_PASSWORD"
  database: "translation_db"

alipay:
  app_id: "YOUR_ALIPAY_APP_ID"
  private_key: |
    -----BEGIN RSA PRIVATE KEY-----
    YOUR_RSA2_PRIVATE_KEY_HERE
    -----END RSA PRIVATE KEY-----
  public_key: |
    -----BEGIN PUBLIC KEY-----
    YOUR_ALIPAY_RSA2_PUBLIC_KEY_HERE
    -----END PUBLIC KEY-----
  notify_url: "https://yourdomain.com/api/payment/notify"
  sandbox: true
